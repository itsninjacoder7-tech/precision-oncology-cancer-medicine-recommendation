<!DOCTYPE html>
<html>

<head>

<title>Precision Oncology AI</title>

<style>

body{
    font-family:Segoe UI,sans-serif;
    margin:0;
    padding:30px;
    background:#eef4ff;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    background:#0f172a;
    color:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    margin-bottom:25px;
}

.upload-box{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input[type=file],
textarea{

    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border-radius:10px;
    border:1px solid #ccc;
}

textarea{
    height:120px;
}

button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.dashboard{

    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{

    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.card h3{
    margin-top:0;
    color:#2563eb;
}

.big{
    font-size:30px;
    font-weight:bold;
}

.confidence{

    color:green;
    font-size:30px;
    font-weight:bold;
}

.ai-output{

    margin-top:25px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

pre{
    white-space:pre-wrap;
    font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🏥 Precision Oncology Recommendation System</h1>

<p>
AI Powered Cancer Drug Recommendation Platform
</p>

</div>

<div class="upload-box">

<form action="/predict" method="POST" enctype="multipart/form-data">

<label>
Upload PDF / CSV / TXT
</label>

<input type="file"
name="file"
accept=".pdf,.csv,.txt">

<textarea
name="prompt"
placeholder="Example: HER2 positive breast cancer patient requiring treatment recommendation">
</textarea>

<button type="submit">
Generate AI Recommendation
</button>

</form>

</div>

{% if result %}

<div class="dashboard">

<div class="card">
<h3>🤖 AI Status</h3>
<div class="big">Completed</div>
</div>

<div class="card">
<h3>📊 Confidence Score</h3>
<div class="confidence">
{{ confidence }}%
</div>
</div>

<div class="card">
<h3>💊 Recommendation</h3>
<div class="big">Generated</div>
</div>

<div class="card">
<h3>✅ Clinical Review</h3>
<div class="big">Available</div>
</div>

</div>

<div class="ai-output">

<h2>🧬 Precision Oncology Report</h2>

<pre>{{ result }}</pre>

</div>

{% endif %}

</div>

</body>

</html>
